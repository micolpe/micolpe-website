<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Micolpe Contact</title>
  <meta name="description" content="Contact the Micolpe team.">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="icon" href="../assets/img/logo.png">
</head>

<body>
<header class="topbar">
  <div class="container nav">
    <a class="brand" href="index.html">
      <img src="../assets/img/logo.png" alt="Logo Micolpe">
      <span>Micolpe</span>
    </a>

    <nav class="links">
      <a href="index.html">Home</a>
      <a href="download.html">Download</a>
      <a href="guide.html">Quick guide</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<main>
  <section class="page-head">
    <div class="container">
      <h1>Contact</h1>
      <p class="lead">
        A question, a suggestion or need help? Contact us.
      </p>
    </div>
  </section>

  <section class="section">
    <div class="container">

      <form class="contact-form"
          name="contact"
          method="POST"
          data-netlify="true"
          action="/success.html">

        <input type="hidden" name="form-name" value="contact">

        <label for="name">Name</label>
        <input id="name" name="name" type="text" required>

        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" required>
        
        <label for="subject">Subject</label>
        <input id="subject" name="subject" type="text">
        
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>
        
        <button class="btn primary" type="submit">
          Send
        </button>

        <p class="muted">
          Email : contact@micolpe.com<br>
          Support : support@micolpe.com
        </p>

      </form>

    </div>
  </section>
</main>

<footer class="footer">
  <div class="container footer-grid">
    <div>© 2026 Micolpe</div>
    <div>contact@micolpe.com · support@micolpe.com</div>
  </div>
</footer>
</body>
</html>
